name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  test:
    name: test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run package tests on iOS simulator
        run: >
          xcodebuild -scheme SwDesignSystem
          -destination 'platform=iOS Simulator,name=iPhone 16'
          -derivedDataPath .build/dd test
